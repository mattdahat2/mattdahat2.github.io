<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Song Library</title>

  <link
    href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #111;
      color: white;
    }

    h1 {
      margin-bottom: 20px;
    }

    #song-table {
      background: white;
      color: black;
      border-radius: 8px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<h1>Song Library</h1>

<div id="song-table"></div>

<script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>

<script>
fetch("songs.csv")
  .then(response => response.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);

    const data = rows.map(row => {
      const cols = row.split(",");

      return {
        title: cols[0],
        artist: cols[1],
        album: cols[2],
        year: cols[3],
        length: cols[4],
        bpm: cols[5]
      };
    });

    new Tabulator("#song-table", {
      data: data,
      layout: "fitColumns",
      responsiveLayout: "collapse",
      pagination: true,
      paginationSize: 25,
      columns: [
        { title: "Title", field: "title" },
        { title: "Artist", field: "artist" },
        { title: "Album", field: "album" },
        { title: "Year", field: "year" },
        { title: "Length", field: "length" },
        { title: "BPM", field: "bpm" }
      ]
    });
  });
</script>

</body>
</html>
